<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KARF ダッシュボード</title>
<style>
  :root {
    --color-bg: #f8f8f8;
    --color-surface: #ffffff;
    --color-border: #f0f0f0;
    --color-text: #111111;
    --color-text-secondary: #666666;
    --color-text-tertiary: #999999;
    --color-primary: #000000;
    --color-primary-light: #333333;

    --space-xs: 4px;
    --space-sm: 8px;
    --space-md: 16px;
    --space-lg: 24px;
    --space-xl: 32px;

    --shadow-sm: 0 1px 2px rgba(0,0,0,0.04);
    --shadow-md: 0 2px 8px rgba(0,0,0,0.06);
    --shadow-lg: 0 4px 16px rgba(0,0,0,0.08);

    --radius-sm: 8px;
    --radius-md: 12px;
    --radius-lg: 16px;

    --text-xs: 10px;
    --text-sm: 12px;
    --text-base: 14px;
    --text-md: 15px;
    --text-lg: 18px;
    --text-xl: 22px;
    --text-2xl: 28px;

    --color-critical: #dc2626;
    --color-high: #d97706;
    --color-medium: #2563eb;
    --color-low: #16a34a;

    --color-pass-bg: #f0fdf4;
    --color-pass-fg: #166534;
    --color-warn-bg: #fefce8;
    --color-warn-fg: #854d0e;
    --color-fail-bg: #fef2f2;
    --color-fail-fg: #7f1d1d;
  }

  * { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', sans-serif; box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--color-bg); color: var(--color-text); min-height: 100vh; }

  .container { max-width: 1200px; margin: 0 auto; padding: var(--space-lg); }

  /* Header */
  .header { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: var(--space-md); margin-bottom: var(--space-lg); }
  .header h1 { font-size: var(--text-2xl); font-weight: 700; color: var(--color-primary); letter-spacing: -0.02em; }
  .header-right { display: flex; align-items: center; gap: var(--space-md); }
  .header select { height: 40px; padding: 0 var(--space-md); border: 1.5px solid var(--color-border); border-radius: var(--radius-sm); font-size: var(--text-base); background: var(--color-surface); color: var(--color-text); cursor: pointer; outline: none; }
  .header select:focus { border-color: var(--color-primary); }
  .review-meta { font-size: var(--text-xs); color: var(--color-text-tertiary); text-align: right; line-height: 1.6; }

  /* KPI Cards */
  .kpi-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: var(--space-md); margin-bottom: var(--space-lg); }
  .kpi-card { background: var(--color-surface); border: 1px solid var(--color-border); border-radius: var(--radius-md); padding: var(--space-lg); box-shadow: var(--shadow-sm); text-align: center; transition: box-shadow 0.2s; }
  .kpi-card:hover { box-shadow: var(--shadow-md); }
  .kpi-card .kpi-value { font-size: 36px; font-weight: 700; line-height: 1.2; }
  .kpi-card .kpi-label { font-size: var(--text-sm); color: var(--color-text-secondary); margin-top: var(--space-xs); }
  .kpi-card .kpi-sub { font-size: var(--text-xs); color: var(--color-text-tertiary); margin-top: 2px; }
  .kpi-total .kpi-value { color: var(--color-primary); }
  .kpi-critical .kpi-value { color: var(--color-critical); }
  .kpi-resolved .kpi-value { color: var(--color-low); }
  .kpi-rate .kpi-value { color: var(--color-medium); }

  /* Section */
  .section { background: var(--color-surface); border: 1px solid var(--color-border); border-radius: var(--radius-md); padding: var(--space-lg); box-shadow: var(--shadow-sm); margin-bottom: var(--space-lg); }
  .section-title { font-size: var(--text-lg); font-weight: 700; color: var(--color-primary); margin-bottom: var(--space-md); }

  /* Trend Chart */
  .trend-container { position: relative; width: 100%; height: 280px; }
  .trend-container svg { width: 100%; height: 100%; }
  .trend-legend { display: flex; gap: var(--space-lg); margin-top: var(--space-md); flex-wrap: wrap; }
  .trend-legend-item { display: flex; align-items: center; gap: var(--space-xs); font-size: var(--text-sm); color: var(--color-text-secondary); }
  .trend-legend-dot { width: 10px; height: 10px; border-radius: 50%; }

  /* Charts grid */
  .charts-grid { display: grid; grid-template-columns: 1fr 1fr; gap: var(--space-lg); margin-bottom: var(--space-lg); }

  /* Bar chart */
  .bar-chart { display: flex; flex-direction: column; gap: var(--space-sm); }
  .bar-row { display: flex; align-items: center; gap: var(--space-sm); }
  .bar-label { width: 100px; font-size: var(--text-sm); color: var(--color-text-secondary); text-align: right; flex-shrink: 0; }
  .bar-track { flex: 1; height: 24px; background: #f3f4f6; border-radius: 4px; overflow: hidden; position: relative; }
  .bar-fill { height: 100%; border-radius: 4px; transition: width 0.5s ease; display: flex; align-items: center; justify-content: flex-end; padding-right: var(--space-sm); }
  .bar-value { font-size: var(--text-xs); font-weight: 600; color: white; }
  .bar-value-outside { font-size: var(--text-xs); font-weight: 600; color: var(--color-text-secondary); margin-left: var(--space-xs); flex-shrink: 0; }

  /* Stacked bar */
  .stacked-chart { display: flex; flex-direction: column; gap: var(--space-md); }
  .stacked-group-label { font-size: var(--text-xs); color: var(--color-text-tertiary); font-weight: 600; margin-bottom: 2px; margin-top: var(--space-sm); }
  .stacked-group-label:first-child { margin-top: 0; }
  .stacked-row { display: flex; align-items: center; gap: var(--space-sm); }
  .stacked-label { width: 80px; font-size: var(--text-sm); font-weight: 500; color: var(--color-text-secondary); flex-shrink: 0; }
  .stacked-track { flex: 1; height: 28px; display: flex; border-radius: 4px; overflow: hidden; }
  .stacked-seg { display: flex; align-items: center; justify-content: center; font-size: var(--text-xs); font-weight: 600; transition: width 0.5s ease; min-width: 0; }
  .stacked-seg-p { background: var(--color-pass-bg); color: var(--color-pass-fg); }
  .stacked-seg-w { background: var(--color-warn-bg); color: var(--color-warn-fg); }
  .stacked-seg-f { background: var(--color-fail-bg); color: var(--color-fail-fg); }
  .stacked-counts { font-size: var(--text-xs); color: var(--color-text-tertiary); margin-left: var(--space-sm); flex-shrink: 0; white-space: nowrap; }

  /* Heatmap */
  .heatmap-container { overflow-x: auto; }
  .heatmap-table { width: 100%; border-collapse: collapse; }
  .heatmap-table th { font-size: var(--text-xs); font-weight: 600; color: var(--color-text-tertiary); padding: var(--space-sm) var(--space-md); text-align: center; border-bottom: 2px solid var(--color-border); }
  .heatmap-table th:first-child { text-align: left; }
  .heatmap-table td { padding: var(--space-sm) var(--space-md); text-align: center; border-bottom: 1px solid var(--color-border); }
  .heatmap-table td:first-child { text-align: left; font-size: var(--text-sm); font-weight: 500; }
  .heatmap-cell { display: inline-block; padding: 4px 12px; border-radius: 4px; font-size: var(--text-xs); font-weight: 600; min-width: 32px; }
  .heatmap-P { background: var(--color-pass-bg); color: var(--color-pass-fg); }
  .heatmap-W { background: var(--color-warn-bg); color: var(--color-warn-fg); }
  .heatmap-F { background: var(--color-fail-bg); color: var(--color-fail-fg); }

  /* FMEA Table */
  .fmea-header { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: var(--space-sm); margin-bottom: var(--space-md); }
  .fmea-count { font-size: var(--text-sm); color: var(--color-text-tertiary); }
  .fmea-controls { display: flex; gap: var(--space-sm); flex-wrap: wrap; }
  .fmea-controls select { height: 32px; padding: 0 var(--space-sm); border: 1.5px solid var(--color-border); border-radius: 6px; font-size: var(--text-xs); background: var(--color-surface); outline: none; cursor: pointer; }
  .fmea-controls select:focus { border-color: var(--color-primary); }
  .fmea-table-wrap { overflow-x: auto; }
  .fmea-table { width: 100%; border-collapse: collapse; font-size: var(--text-sm); }
  .fmea-table th { background: #f9fafb; border-bottom: 2px solid var(--color-border); padding: var(--space-sm) var(--space-md); text-align: left; font-weight: 600; color: var(--color-text-secondary); cursor: pointer; white-space: nowrap; user-select: none; transition: color 0.15s; }
  .fmea-table th:hover { color: var(--color-primary); }
  .fmea-table th .sort-arrow { font-size: 10px; margin-left: 2px; opacity: 0.5; }
  .fmea-table th .sort-arrow.active { opacity: 1; }
  .fmea-table td { border-bottom: 1px solid var(--color-border); padding: var(--space-sm) var(--space-md); }
  .fmea-table tbody tr { transition: background 0.15s; }
  .fmea-table tbody tr:hover { background: #f9fafb; }
  .severity-badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: var(--text-xs); font-weight: 600; }
  .severity-Critical { background: #fef2f2; color: var(--color-critical); }
  .severity-High { background: #fffbeb; color: var(--color-high); }
  .severity-Medium { background: #eff6ff; color: var(--color-medium); }
  .severity-Low { background: #f0fdf4; color: var(--color-low); }
  .status-badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: var(--text-xs); font-weight: 600; }
  .status-open { background: #f3f4f6; color: #6b7280; }
  .status-in_progress { background: #fefce8; color: #854d0e; }
  .status-design_documented { background: #eff6ff; color: #1d4ed8; }
  .status-resolved { background: #f0fdf4; color: #166534; }
  .rpn-cell { font-variant-numeric: tabular-nums; }

  /* Footer */
  .footer { text-align: center; padding: var(--space-lg) 0; font-size: var(--text-xs); color: var(--color-text-tertiary); }

  /* Responsive */
  @media (max-width: 768px) {
    .kpi-grid { grid-template-columns: repeat(2, 1fr); }
    .charts-grid { grid-template-columns: 1fr; }
    .bar-label { width: 80px; }
    .stacked-label { width: 60px; }
    .header { flex-direction: column; align-items: flex-start; }
    .review-meta { text-align: left; }
  }
  @media (max-width: 480px) {
    .container { padding: var(--space-md); }
    .kpi-card .kpi-value { font-size: 28px; }
  }
</style>
</head>
<body>

<div class="container">

  <!-- Header -->
  <div class="header">
    <h1>KARF ダッシュボード</h1>
    <div class="header-right">
      <div class="review-meta" id="reviewMeta"></div>
      <select id="reviewSelector" onchange="selectReview(this.value)"></select>
    </div>
  </div>

  <!-- KPI Cards -->
  <div class="kpi-grid">
    <div class="kpi-card kpi-total">
      <div class="kpi-value" id="kpiTotal">-</div>
      <div class="kpi-label">総件数</div>
      <div class="kpi-sub" id="kpiTotalSub"></div>
    </div>
    <div class="kpi-card kpi-critical">
      <div class="kpi-value" id="kpiCritical">-</div>
      <div class="kpi-label">Critical</div>
      <div class="kpi-sub" id="kpiCriticalSub"></div>
    </div>
    <div class="kpi-card kpi-resolved">
      <div class="kpi-value" id="kpiResolved">-</div>
      <div class="kpi-label">解決済</div>
      <div class="kpi-sub" id="kpiResolvedSub"></div>
    </div>
    <div class="kpi-card kpi-rate">
      <div class="kpi-value" id="kpiRate">-</div>
      <div class="kpi-label">改善率</div>
      <div class="kpi-sub" id="kpiRateSub"></div>
    </div>
  </div>

  <!-- Severity Trend -->
  <div class="section">
    <div class="section-title">重大度別トレンド</div>
    <div class="trend-container" id="trendChart"></div>
    <div class="trend-legend">
      <div class="trend-legend-item"><div class="trend-legend-dot" style="background:var(--color-critical)"></div>Critical</div>
      <div class="trend-legend-item"><div class="trend-legend-dot" style="background:var(--color-high)"></div>High</div>
      <div class="trend-legend-item"><div class="trend-legend-dot" style="background:var(--color-medium)"></div>Medium</div>
      <div class="trend-legend-item"><div class="trend-legend-dot" style="background:var(--color-low)"></div>Low</div>
    </div>
  </div>

  <!-- Charts Grid -->
  <div class="charts-grid">
    <div class="section">
      <div class="section-title">カテゴリ別平均RPN</div>
      <div id="categoryChart" class="bar-chart"></div>
    </div>
    <div class="section">
      <div class="section-title">C4レベル別 P/W/F</div>
      <div id="c4Chart" class="stacked-chart"></div>
    </div>
  </div>

  <!-- ISO 25010 Heatmap -->
  <div class="section">
    <div class="section-title">ISO 25010 品質特性ヒートマップ</div>
    <div class="heatmap-container">
      <table class="heatmap-table" id="isoHeatmap"></table>
    </div>
  </div>

  <!-- FMEA Detail Table -->
  <div class="section">
    <div class="fmea-header">
      <div class="section-title" style="margin-bottom:0">FMEA 詳細テーブル</div>
      <div class="fmea-count" id="fmeaCount"></div>
    </div>
    <div class="fmea-controls" style="margin-bottom:var(--space-md)">
      <select id="filterCategory" onchange="renderFmeaTable()">
        <option value="">全カテゴリ</option>
      </select>
      <select id="filterSeverity" onchange="renderFmeaTable()">
        <option value="">全重大度</option>
        <option value="Critical">Critical</option>
        <option value="High">High</option>
        <option value="Medium">Medium</option>
        <option value="Low">Low</option>
      </select>
      <select id="filterStatus" onchange="renderFmeaTable()">
        <option value="">全ステータス</option>
        <option value="open">Open</option>
        <option value="design_documented">Design Documented</option>
        <option value="in_progress">In Progress</option>
        <option value="resolved">Resolved</option>
      </select>
    </div>
    <div class="fmea-table-wrap">
      <table class="fmea-table" id="fmeaTable">
        <thead>
          <tr>
            <th onclick="sortFmea('id')">ID <span class="sort-arrow"></span></th>
            <th onclick="sortFmea('description')">故障モード <span class="sort-arrow"></span></th>
            <th onclick="sortFmea('category')">カテゴリ <span class="sort-arrow"></span></th>
            <th onclick="sortFmea('S')">S <span class="sort-arrow"></span></th>
            <th onclick="sortFmea('O')">O <span class="sort-arrow"></span></th>
            <th onclick="sortFmea('D')">D <span class="sort-arrow"></span></th>
            <th onclick="sortFmea('RPN')">RPN <span class="sort-arrow"></span></th>
            <th onclick="sortFmea('severity')">重大度 <span class="sort-arrow"></span></th>
            <th onclick="sortFmea('status')">ステータス <span class="sort-arrow"></span></th>
          </tr>
        </thead>
        <tbody id="fmeaBody"></tbody>
      </table>
    </div>
  </div>

  <div class="footer">KARF v1.0 — KyaraInnovate Architecture Review Framework</div>
</div>

// ============================================================
// State
// ============================================================
let currentReviewIndex = REVIEW_DATA.length - 1;
let fmeaSortKey = 'RPN';
let fmeaSortAsc = false;

// ============================================================
// Initialization
// ============================================================
function init() {
  populateSelector();
  render();
}

function populateSelector() {
  var sel = document.getElementById('reviewSelector');
  sel.innerHTML = '';
  REVIEW_DATA.forEach(function(r, i) {
    var opt = document.createElement('option');
    opt.value = i;
    opt.textContent = r.reviewDate + ' (' + r.targetVersion + ')';
    sel.appendChild(opt);
  });
  sel.value = currentReviewIndex;
}

function selectReview(index) {
  currentReviewIndex = parseInt(index);
  render();
}

function render() {
  var data = REVIEW_DATA[currentReviewIndex];
  renderMeta(data);
  renderKPI(data);
  renderTrend();
  renderCategoryChart(data);
  renderC4Chart();
  renderISOHeatmap();
  populateCategoryFilter(data);
  renderFmeaTable();
}

// ============================================================
// Review Metadata
// ============================================================
function renderMeta(data) {
  var ri = data.reviewerInfo;
  document.getElementById('reviewMeta').innerHTML =
    ri.agentCount + ' agents / ' + ri.filesRead + ' files / ' + ri.durationMinutes + ' min';
}

// ============================================================
// KPI Cards
// ============================================================
function renderKPI(data) {
  var s = data.summary;
  var total = s.totalFmeaItems;
  var critical = s.bySeverity.Critical || 0;
  var resolved = s.resolvedCount;
  var documented = s.designDocumentedCount || 0;
  var baseTotal = REVIEW_DATA[0].summary.totalFmeaItems;
  var addressed = resolved + documented;
  var rate = baseTotal > 0 ? Math.round((addressed / baseTotal) * 100) : 0;

  document.getElementById('kpiTotal').textContent = total;
  document.getElementById('kpiCritical').textContent = critical;
  document.getElementById('kpiResolved').textContent = addressed;
  document.getElementById('kpiRate').textContent = rate + '%';

  var h = s.bySeverity.High || 0;
  var m = s.bySeverity.Medium || 0;
  var l = s.bySeverity.Low || 0;
  document.getElementById('kpiTotalSub').textContent = 'H:' + h + ' M:' + m + ' L:' + l;
  document.getElementById('kpiCriticalSub').textContent = s.openCount + ' open';
  document.getElementById('kpiResolvedSub').textContent = documented + ' documented / ' + resolved + ' resolved';
  document.getElementById('kpiRateSub').textContent = addressed + ' / ' + baseTotal + ' (\u5bfe\u5fdc\u6e08)';
}

// ============================================================
// Severity Trend (SVG) — dynamic Y-axis
// ============================================================
function renderTrend() {
  var container = document.getElementById('trendChart');
  var padL = 60, padR = 20, padT = 25, padB = 35;
  var w = 600, h = 280;
  var chartW = w - padL - padR;
  var chartH = h - padT - padB;

  // Calculate dynamic Y max across all reviews
  var globalMax = 0;
  REVIEW_DATA.forEach(function(r) {
    var b = r.summary.bySeverity;
    globalMax = Math.max(globalMax, b.Critical||0, b.High||0, b.Medium||0, b.Low||0);
  });
  var yMax = Math.ceil(globalMax / 5) * 5 + 5;
  if (yMax < 10) yMax = 10;

  function yPos(v) { return padT + chartH - (v / yMax) * chartH; }

  // Grid lines + Y labels
  function drawGrid() {
    var out = '';
    var step = yMax <= 20 ? 5 : 10;
    for (var v = 0; v <= yMax; v += step) {
      var yy = yPos(v);
      out += '<line x1="' + padL + '" y1="' + yy + '" x2="' + (w - padR) + '" y2="' + yy + '" stroke="#f3f4f6" stroke-width="1"/>';
      out += '<text x="' + (padL - 8) + '" y="' + (yy + 4) + '" text-anchor="end" fill="#9ca3af" font-size="10">' + v + '</text>';
    }
    return out;
  }

  var severities = [
    { key: 'Critical', color: 'var(--color-critical)' },
    { key: 'High', color: 'var(--color-high)' },
    { key: 'Medium', color: 'var(--color-medium)' },
    { key: 'Low', color: 'var(--color-low)' }
  ];

  if (REVIEW_DATA.length < 2) {
    // Single data point
    var sev = REVIEW_DATA[0].summary.bySeverity;
    var svg = '<svg viewBox="0 0 ' + w + ' ' + h + '" preserveAspectRatio="xMidYMid meet">';
    svg += '<rect x="' + padL + '" y="' + padT + '" width="' + chartW + '" height="' + chartH + '" fill="none" stroke="#e5e7eb" stroke-width="1" rx="4"/>';
    svg += drawGrid();

    var cx = padL + chartW / 2;
    severities.forEach(function(s) {
      var val = sev[s.key] || 0;
      var cy = yPos(val);
      svg += '<circle cx="' + cx + '" cy="' + cy + '" r="5" fill="' + s.color + '" stroke="white" stroke-width="2"/>';
      svg += '<text x="' + (cx + 10) + '" y="' + (cy + 4) + '" fill="' + s.color + '" font-size="11" font-weight="600">' + val + '</text>';
    });
    svg += '<text x="' + cx + '" y="' + (h - 8) + '" text-anchor="middle" fill="#9ca3af" font-size="10">' + REVIEW_DATA[0].reviewDate + '</text>';
    svg += '<text x="' + cx + '" y="' + (padT + chartH / 2) + '" text-anchor="middle" fill="#d1d5db" font-size="12">\u6B21\u306E\u30EC\u30D3\u30E5\u30FC\u5F8C\u306B\u30C8\u30EC\u30F3\u30C9\u304C\u8868\u793A\u3055\u308C\u307E\u3059</text>';
    svg += '</svg>';
    container.innerHTML = svg;
    return;
  }

  // Multiple data points
  function xPos(i) { return padL + (i / (REVIEW_DATA.length - 1)) * chartW; }

  var svg = '<svg viewBox="0 0 ' + w + ' ' + h + '" preserveAspectRatio="xMidYMid meet">';
  svg += '<rect x="' + padL + '" y="' + padT + '" width="' + chartW + '" height="' + chartH + '" fill="none" stroke="#e5e7eb" stroke-width="1" rx="4"/>';
  svg += drawGrid();

  // X labels
  REVIEW_DATA.forEach(function(r, i) {
    svg += '<text x="' + xPos(i) + '" y="' + (h - 8) + '" text-anchor="middle" fill="#9ca3af" font-size="10">' + r.reviewDate.slice(5) + '</text>';
  });

  // Lines + dots
  severities.forEach(function(s) {
    var points = REVIEW_DATA.map(function(r, i) {
      return xPos(i) + ',' + yPos(r.summary.bySeverity[s.key] || 0);
    });
    svg += '<polyline points="' + points.join(' ') + '" fill="none" stroke="' + s.color + '" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>';
    REVIEW_DATA.forEach(function(r, i) {
      var val = r.summary.bySeverity[s.key] || 0;
      svg += '<circle cx="' + xPos(i) + '" cy="' + yPos(val) + '" r="4" fill="' + s.color + '" stroke="white" stroke-width="1.5"/>';
    });
  });

  svg += '</svg>';
  container.innerHTML = svg;
}

// ============================================================
// Category Average RPN (Horizontal Bar)
// ============================================================
function renderCategoryChart(data) {
  var container = document.getElementById('categoryChart');
  var cats = data.summary.byCategory;
  var sorted = Object.entries(cats).sort(function(a, b) { return b[1].avgRPN - a[1].avgRPN; });
  var maxRPN = sorted.length > 0 ? sorted[0][1].avgRPN : 1;

  var categoryColors = {
    '\u30BB\u30AD\u30E5\u30EA\u30C6\u30A3': 'var(--color-critical)',
    '\u4FE1\u983C\u6027': '#ef4444',
    '\u6A5F\u80FD\u6027': '#f97316',
    '\u4FDD\u5B88\u6027': 'var(--color-high)',
    '\u6027\u80FD': '#eab308',
    '\u79FB\u690D\u6027': 'var(--color-medium)',
    '\u4E92\u63DB\u6027': '#8b5cf6',
    '\u4F7F\u7528\u6027': '#06b6d4',
    '\u30C9\u30AD\u30E5\u30E1\u30F3\u30C8': '#64748b'
  };

  container.innerHTML = sorted.map(function(entry) {
    var cat = entry[0], info = entry[1];
    var pct = (info.avgRPN / maxRPN) * 100;
    var color = categoryColors[cat] || '#6b7280';
    var showInside = pct > 15;
    return '<div class="bar-row">' +
      '<div class="bar-label">' + cat + ' <span style="opacity:0.5">(' + info.count + ')</span></div>' +
      '<div class="bar-track">' +
      '<div class="bar-fill" style="width:' + pct + '%;background:' + color + '">' +
      (showInside ? '<span class="bar-value">' + info.avgRPN + '</span>' : '') +
      '</div>' +
      '</div>' +
      (!showInside ? '<span class="bar-value-outside">' + info.avgRPN + '</span>' : '') +
      '</div>';
  }).join('');
}

function renderC4Chart() {
  var container = document.getElementById('c4Chart');
  var levels = ['L1', 'L2', 'L3', 'L4'];
  var html = '';

  levels.forEach(function(level) {
    REVIEW_DATA.forEach(function(r, ri) {
      var d = r.c4Results[level];
      var total = d.pass + d.warn + d.fail;
      if (total === 0) return;
      var pP = (d.pass / total) * 100;
      var pW = (d.warn / total) * 100;
      var pF = (d.fail / total) * 100;
      var label = REVIEW_DATA.length > 1
        ? level + ' ' + d.label + ' (' + r.reviewDate.slice(5) + ')'
        : level + ' ' + d.label;

      html += '<div class="stacked-row">' +
        '<div class="stacked-label">' + label + '</div>' +
        '<div class="stacked-track">' +
        (d.pass > 0 ? '<div class="stacked-seg stacked-seg-p" style="width:' + pP + '%">P:' + d.pass + '</div>' : '') +
        (d.warn > 0 ? '<div class="stacked-seg stacked-seg-w" style="width:' + pW + '%">W:' + d.warn + '</div>' : '') +
        (d.fail > 0 ? '<div class="stacked-seg stacked-seg-f" style="width:' + pF + '%">F:' + d.fail + '</div>' : '') +
        '</div>' +
        '</div>';
    });
  });

  container.innerHTML = html;
}

// ============================================================
// ISO 25010 Heatmap — all reviews as columns
// ============================================================
function renderISOHeatmap() {
  var table = document.getElementById('isoHeatmap');
  var chars = ['\u6A5F\u80FD\u9069\u5408\u6027', '\u6027\u80FD\u52B9\u7387\u6027', '\u4E92\u63DB\u6027', '\u4F7F\u7528\u6027', '\u4FE1\u983C\u6027', '\u30BB\u30AD\u30E5\u30EA\u30C6\u30A3', '\u4FDD\u5B88\u6027', '\u79FB\u690D\u6027'];

  var thead = '<thead><tr><th>\u54C1\u8CEA\u7279\u6027</th>';
  REVIEW_DATA.forEach(function(r) {
    thead += '<th>' + r.reviewDate.slice(5) + '</th>';
  });
  thead += '</tr></thead>';

  var tbody = '<tbody>';
  chars.forEach(function(ch) {
    tbody += '<tr><td>' + ch + '</td>';
    REVIEW_DATA.forEach(function(r) {
      var res = r.iso25010Results[ch];
      if (res) {
        tbody += '<td><span class="heatmap-cell heatmap-' + res.result + '">' + res.result + '</span></td>';
      } else {
        tbody += '<td>-</td>';
      }
    });
    tbody += '</tr>';
  });
  tbody += '</tbody>';

  table.innerHTML = thead + tbody;
}

// ============================================================
// FMEA Table
// ============================================================
function populateCategoryFilter(data) {
  var sel = document.getElementById('filterCategory');
  var current = sel.value;
  var categories = [];
  var seen = {};
  data.fmeaItems.forEach(function(f) {
    if (!seen[f.category]) { seen[f.category] = true; categories.push(f.category); }
  });
  categories.sort();
  sel.innerHTML = '<option value="">\u5168\u30AB\u30C6\u30B4\u30EA</option>' +
    categories.map(function(c) {
      return '<option value="' + c + '"' + (c === current ? ' selected' : '') + '>' + c + '</option>';
    }).join('');
}

function sortFmea(key) {
  if (fmeaSortKey === key) {
    fmeaSortAsc = !fmeaSortAsc;
  } else {
    fmeaSortKey = key;
    fmeaSortAsc = key === 'id' || key === 'description' || key === 'category';
  }
  renderFmeaTable();
}

function renderFmeaTable() {
  var data = REVIEW_DATA[currentReviewIndex];
  var catFilter = document.getElementById('filterCategory').value;
  var sevFilter = document.getElementById('filterSeverity').value;
  var statusFilter = document.getElementById('filterStatus').value;

  var items = data.fmeaItems.slice();
  if (catFilter) items = items.filter(function(f) { return f.category === catFilter; });
  if (sevFilter) items = items.filter(function(f) { return f.severity === sevFilter; });
  if (statusFilter) items = items.filter(function(f) { return f.status === statusFilter; });

  var sevOrder = { Critical: 0, High: 1, Medium: 2, Low: 3 };

  items.sort(function(a, b) {
    var va = a[fmeaSortKey], vb = b[fmeaSortKey];
    if (fmeaSortKey === 'severity') { va = sevOrder[va]; vb = sevOrder[vb]; }
    if (typeof va === 'string') { va = va.toLowerCase(); vb = vb.toLowerCase(); }
    if (va < vb) return fmeaSortAsc ? -1 : 1;
    if (va > vb) return fmeaSortAsc ? 1 : -1;
    return 0;
  });

  // Update count display
  var totalItems = data.fmeaItems.length;
  var countEl = document.getElementById('fmeaCount');
  if (items.length === totalItems) {
    countEl.textContent = totalItems + ' \u4EF6';
  } else {
    countEl.textContent = items.length + ' / ' + totalItems + ' \u4EF6';
  }

  var tbody = document.getElementById('fmeaBody');
  tbody.innerHTML = items.map(function(f) {
    return '<tr>' +
      '<td><strong>' + f.id + '</strong></td>' +
      '<td>' + f.description + '</td>' +
      '<td>' + f.category + '</td>' +
      '<td class="rpn-cell">' + f.S + '</td>' +
      '<td class="rpn-cell">' + f.O + '</td>' +
      '<td class="rpn-cell">' + f.D + '</td>' +
      '<td class="rpn-cell"><strong>' + f.RPN + '</strong></td>' +
      '<td><span class="severity-badge severity-' + f.severity + '">' + f.severity + '</span></td>' +
      '<td><span class="status-badge status-' + f.status + '">' + f.status.replace('_', ' ') + '</span></td>' +
      '</tr>';
  }).join('');

  // Update sort arrows
  document.querySelectorAll('.fmea-table th').forEach(function(th) {
    var arrow = th.querySelector('.sort-arrow');
    if (!arrow) return;
    var match = th.getAttribute('onclick');
    if (!match) return;
    var keyMatch = match.match(/sortFmea\('(.+?)'\)/);
    if (!keyMatch) return;
    var key = keyMatch[1];
    if (key === fmeaSortKey) {
      arrow.textContent = fmeaSortAsc ? ' \u25B2' : ' \u25BC';
      arrow.classList.add('active');
    } else {
      arrow.textContent = '';
      arrow.classList.remove('active');
    }
  });
}

init();
